[defaults]
inventory          = ./inventory.yml
roles_path         = ./roles
host_key_checking  = False
remote_user        = ec2-user
private_key_file   = ./ssh_key.pem
interpreter_python = auto_silent

[ssh_connection]
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
